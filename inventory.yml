# ============================================================
# inventory.yml - 主机清单
# 部署前必改：将 IP/用户/密码替换为实际环境的值
# 说明：
#   physical 组 → PG Leader（Patroni Master）
#   vm 组      → PG Replica + 监控中心（Prometheus/Grafana/Alertmanager）
# ============================================================
all:
  children:
    # --- PG Leader（物理机/主节点） ---
    physical:
      hosts:
        server:
          ansible_host: 192.168.222.128
          ansible_user: root
          # 直接 root 登录，无需 become
          # 手工指定物理 IP（Prometheus 模板用）
          physical_ip: 192.168.222.128

    # --- PG Replica + 监控中心（VM - 控制节点，本地执行） ---
    vm:
      hosts:
        vm-host:
          ansible_connection: local
          ansible_user: user2
          ansible_become: true
          ansible_become_method: sudo
          ansible_become_flags: '-H -S'
          ansible_become_password: ''

    # --- PG 集群（流复制组） ---
    pg_cluster:
      children:
        physical:
        vm:

    # --- 所有受监控节点 ---
    all_monitored:
      children:
        physical:
        vm:
