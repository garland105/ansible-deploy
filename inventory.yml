# ============================================================
# inventory.yml - 主机清单
# 部署前必改：将 IP/用户/密码替换为实际环境的值
# 说明：
#   physical 组 → PG Leader（Patroni Master）
#   vm 组      → PG Replica + 监控中心（Prometheus/Grafana/Alertmanager）
# ============================================================
all:
  children:
    # --- PG Leader（物理机/主节点） ---
    physical:
      hosts:
        server:
          ansible_host: 192.168.222.128
          ansible_user: use1
          ansible_ssh_pass: '1'
          ansible_become: true
          ansible_become_method: sudo
          ansible_become_pass: '1'
          # 手工指定物理 IP（Prometheus 模板用，避免 NAT 下解析到 127.0.0.1）
          physical_ip: 192.168.222.128

    # --- PG Replica + 监控中心（VM） ---
    vm:
      hosts:
        vm-host:
          ansible_host: 192.168.222.129
          ansible_user: user2
          ansible_ssh_pass: '2'
          ansible_become: true
          ansible_become_method: sudo
          ansible_become_pass: '2'

    # --- PG 集群（流复制组） ---
    pg_cluster:
      children:
        physical:
        vm:

    # --- 所有受监控节点 ---
    all_monitored:
      children:
        physical:
        vm:
