# ============================================================
# alert_rules.yml - Prometheus 告警规则（8条）
# 覆盖：系统宕机/CPU/内存/磁盘/PG连接/PG复制/HTTP服务
# ============================================================
groups:
  - name: infra_alerts
    rules:
      # 1. 机器宕机检测
      - alert: NodeDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} is down"
          description: "Server {{ $labels.instance }} has been unreachable for 1 minute"

      # 2. CPU 使用率过高
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU > 80% on {{ $labels.instance }}"

      # 3. 内存使用率过高
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Memory > 90% on {{ $labels.instance }}"

      # 4. 磁盘空间不足
      - alert: DiskSpaceLow
        expr: 100 - ((node_filesystem_avail_bytes{mountpoint="/"} * 100) / node_filesystem_size_bytes{mountpoint="/"}) > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Disk > 85% on {{ $labels.instance }}"

      # 5. TCP 端口探测失败（替换 target 为你的服务地址）
      - alert: ServiceDown
        expr: probe_success{job="blackbox_tcp"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "TCP service is down"
          description: "Probe target {{ $labels.instance }} is not responding"

      # 6. PostgreSQL 不可达
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is unreachable"
          description: "PG Exporter cannot connect to database on {{ $labels.instance }}"

      # 7. PG 主从复制延迟
      - alert: PGReplicationLag
        expr: pg_stat_replication_flush_lag_bytes > 104857600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PG replication lag > 100MB"
          description: "Standby replication lag exceeds 100MB on {{ $labels.instance }}"

      # 8. PG 活跃连接过多
      - alert: PGTooManyConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PG connections > 80"
          description: "Active PostgreSQL connections exceed 80 on {{ $labels.instance }}"
