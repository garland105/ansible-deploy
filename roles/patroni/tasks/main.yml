# ============================================================
# roles/patroni/tasks/main.yml
# Patroni - PG 高可用管理
# 全部使用 apt 安装（Ubuntu 24.04 自带 Patroni 3.2.2）
# ============================================================

# --- 第一步：安装 Patroni（两台都用 apt） ---
- name: "检查 Patroni 是否已安装"
  command: which patroni
  register: pat_installed
  failed_when: false
  changed_when: false

- name: "安装 Patroni（apt）"
  apt:
    name: patroni
    state: present
  when: pat_installed.rc != 0

# --- 第二步：创建 PG 用户（admin / repl_user）---
- name: "创建 admin 超级用户"
  become: yes
  become_user: postgres
  postgresql_user:
    name: admin
    password: "{{ pg_admin_password }}"
    role_attr_flags: SUPERUSER,LOGIN,CREATEDB,CREATEROLE
  # 无条件执行，idempotent

- name: "创建 repl_user 复制用户"
  become: yes
  become_user: postgres
  postgresql_user:
    name: repl_user
    password: "{{ pg_repl_password }}"
    role_attr_flags: LOGIN,REPLICATION

# --- 第三步：配置 Patroni ---
- name: "创建 /etc/patroni 目录"
  file:
    path: /etc/patroni
    state: directory
    mode: "0755"

- name: "部署 Patroni 配置文件"
  template:
    src: ha.yml.j2
    dest: /etc/patroni/ha.yml
  notify: restart patroni

# --- 第四步：创建并启动 systemd 服务 ---
- name: "停用原 PG systemd 服务（Patroni 接管）"
  systemd:
    name: postgresql
    state: stopped
    enabled: no

- name: "确保 PG 数据目录有 conf.d"
  file:
    path: "{{ patroni_data_dir }}/conf.d"
    state: directory

- name: "创建 Patroni systemd 服务"
  copy:
    dest: /etc/systemd/system/patroni.service
    content: |
      [Unit]
      Description=Patroni HA for PostgreSQL
      After=network.target etcd.service

      [Service]
      Type=simple
      User=postgres
      Group=postgres
      ExecStart=/usr/bin/patroni /etc/patroni/ha.yml
      KillMode=process
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

- name: "启动 Patroni"
  systemd:
    name: patroni
    state: restarted
    enabled: yes
    daemon_reload: yes

- name: "等待 Patroni 就绪（PG 端口 5432）"
  wait_for:
    port: 5432
    timeout: 60
    delay: 10

- name: "验证 Patroni 集群状态"
  command: patronictl -c /etc/patroni/ha.yml list
  register: pat_status
  changed_when: false
  retries: 5
  delay: 3
