# ============================================================
# roles/patroni/tasks/main.yml
# Patroni - PG 高可用管理
# 物理机（Leader）用 venv 安装，VM（Replica）用 apt
# ============================================================

# --- 第一步：安装 Patroni ---
- name: "检查 Patroni 是否已安装（apt）"
  command: which patroni
  register: pat_apt
  failed_when: false
  changed_when: false

- name: "VM 使用 apt 安装 Patroni"
  apt:
    name: patroni
    state: present
  when: "'vm' in group_names and pat_apt.rc != 0"

- name: "物理机用 venv 安装 Patroni"
  block:
    - name: "安装 Python venv 依赖"
      apt:
        name:
          - python3-pip
          - python3.12-venv
        state: present

    - name: "创建 venv 目录"
      file:
        path: /opt/patroni/venv
        state: directory
        mode: "0755"

    - name: "创建 Python 虚拟环境"
      command: python3 -m venv /opt/patroni/venv
      args:
        creates: /opt/patroni/venv/bin/activate

    - name: "在 venv 中安装 Patroni 4.1.3"
      pip:
        name:
          - "patroni[etcd3]==4.1.3"
          - psycopg2-binary
        virtualenv: /opt/patroni/venv

    - name: "让 postgres 用户能访问 venv"
      file:
        path: /opt/patroni/venv
        mode: "o+rx"
        recurse: yes
  when: "'physical' in group_names"

# --- 第二步：创建 PG 用户（admin / repl_user）---
- name: "创建 admin 超级用户"
  become: yes
  become_user: postgres
  postgresql_user:
    name: admin
    password: "{{ pg_admin_password }}"
    role_attr_flags: SUPERUSER,LOGIN,CREATEDB,CREATEROLE

- name: "创建 repl_user 复制用户"
  become: yes
  become_user: postgres
  postgresql_user:
    name: repl_user
    password: "{{ pg_repl_password }}"
    role_attr_flags: LOGIN,REPLICATION

# --- 第三步：配置 Patroni ---
- name: "创建 /etc/patroni 目录"
  file:
    path: /etc/patroni
    state: directory
    mode: "0755"

- name: "部署 Patroni 配置文件"
  template:
    src: ha.yml.j2
    dest: /etc/patroni/ha.yml
  notify: restart patroni

# --- 第四步：创建并启动 systemd 服务 ---
- name: "物理机：停用原 PG systemd 服务（Patroni 接管）"
  systemd:
    name: postgresql
    state: stopped
    enabled: no
  when: "'physical' in group_names"

- name: "确保物理机 PG 数据目录有 conf.d"
  file:
    path: /var/lib/postgresql/16/main/conf.d
    state: directory
  when: "'physical' in group_names"

- name: "创建 Patroni systemd 服务"
  copy:
    dest: /etc/systemd/system/patroni.service
    content: |
      [Unit]
      Description=Patroni HA for PostgreSQL
      After=network.target etcd.service

      [Service]
      Type=simple
      User=postgres
      Group=postgres
      ExecStart={{ '/opt/patroni/venv/bin/patroni' if 'physical' in group_names else '/usr/bin/patroni' }} /etc/patroni/ha.yml
      KillMode=process
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

- name: "启动 Patroni"
  systemd:
    name: patroni
    state: restarted
    enabled: yes
    daemon_reload: yes

- name: "等待 Patroni 就绪（PG 端口 5432）"
  wait_for:
    port: 5432
    timeout: 60
    delay: 10

- name: "验证 Patroni 集群状态"
  command: >
    {{ '/opt/patroni/venv/bin/patronictl' if 'physical' in group_names else 'patronictl' }}
    -c /etc/patroni/ha.yml list
  register: pat_status
  changed_when: false
