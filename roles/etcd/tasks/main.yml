# ============================================================
# roles/etcd/tasks/main.yml
# etcd - 分布式配置存储（Patroni DCS）
# 仅部署在 VM 上，使用 snap 安装
# ============================================================

- name: "检查 etcd 是否已安装"
  command: snap list etcd
  register: etcd_installed
  failed_when: false
  changed_when: false

- name: "安装 etcd（snap 方式）"
  command: snap install etcd
  when: etcd_installed.rc != 0

- name: "验证 etcd 版本"
  command: snap list etcd
  register: etcd_version
  changed_when: false

- name: "确保 etcd 配置文件目录存在"
  file:
    path: /var/snap/etcd/common
    state: directory
    mode: '0755'

- name: "复制 etcd 配置文件（从 sample）"
  shell: |
    SAMPLE=$(find /snap/etcd -name "etcd.conf.yml.sample" 2>/dev/null | head -1)
    if [ -n "$SAMPLE" ]; then
      cp "$SAMPLE" /var/snap/etcd/common/etcd.conf.yml
    fi
  args:
    creates: /var/snap/etcd/common/etcd.conf.yml

- name: "开启 etcd v2 API 并监听所有接口（Patroni 需要）"
  lineinfile:
    path: /var/snap/etcd/common/etcd.conf.yml
    regexp: "^#?{{ item.key }}"
    line: "{{ item.key }}: {{ item.value }}"
    state: present
  loop:
    - { key: 'enable-v2', value: 'true' }
    - { key: 'listen-client-urls', value: 'http://0.0.0.0:2379' }
    - { key: 'advertise-client-urls', value: 'http://{{ ansible_default_ipv4.address }}:2379' }
  notify: restart etcd

- name: "确保 etcd snap 服务已启动"
  systemd:
    name: snap.etcd.etcd
    state: started
    enabled: yes

- name: "验证 etcd v2 API 可用"
  uri:
    url: http://127.0.0.1:2379/v2/keys/
    method: GET
  register: etcd_test
  failed_when: etcd_test.status != 200
  retries: 5
  delay: 2

- name: "等待 etcd 端口"
  wait_for:
    port: 2379
    timeout: 15
