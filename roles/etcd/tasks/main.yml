# ============================================================
# roles/etcd/tasks/main.yml
# etcd - 分布式配置存储（Patroni DCS）
# 仅部署在 VM 上，使用 snap 安装
# ============================================================

- name: "检查 etcd 是否已安装"
  command: which etcd
  register: etcd_installed
  failed_when: false
  changed_when: false

- name: "安装 etcd（snap 方式）"
  command: snap install etcd
  when: etcd_installed.rc != 0

- name: "验证 etcd 版本"
  command: snap list etcd
  register: etcd_version
  changed_when: false
  when: etcd_installed.rc != 0

- name: "开启 etcd v2 API（Patroni 需要）"
  lineinfile:
    path: /var/snap/etcd/common/etcd.conf.yml
    line: "enable-v2: true"
    state: present
  notify: restart etcd

- name: "重启 etcd 使配置生效"
  systemd:
    name: snap.etcd.etcd
    state: restarted
  when: etcd_installed.rc != 0

- name: "验证 etcd v2 API 可用"
  uri:
    url: http://127.0.0.1:2379/v2/keys/
    method: GET
  register: etcd_test
  failed_when: etcd_test.status != 200

- name: "等待 etcd 端口"
  wait_for:
    port: 2379
    timeout: 10
