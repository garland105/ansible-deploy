# ============================================================
# roles/alertmanager/files/alertmanager.yml
# Alertmanager 配置 - 告警路由 + DingTalk Webhook 发送
# ============================================================
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'default'
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: 'default'
      repeat_interval: 30m

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:8060/dingtalk/webhook1/send'
        send_resolved: true
