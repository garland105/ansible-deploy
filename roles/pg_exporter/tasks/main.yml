# ============================================================
# roles/pg_exporter/tasks/main.yml
# PostgreSQL Exporter - 数据库指标采集
# 需先在 PG 中创建 monitor 用户
# ============================================================

- name: "检查 PG Exporter 是否已安装"
  stat:
    path: /opt/monitoring/postgres_exporter
  register: pge_installed

- name: "下载 PG Exporter 二进制"
  get_url:
    url: "{{ download_mirror }}https://github.com/prometheus-community/postgres_exporter/releases/download/v0.15.0/postgres_exporter-0.15.0.linux-amd64.tar.gz"
    dest: /tmp/pg_exporter.tar.gz
    timeout: 60
  when: not pge_installed.stat.exists

- name: "解压并安装 PG Exporter"
  unarchive:
    src: /tmp/pg_exporter.tar.gz
    dest: /tmp
    remote_src: yes
  when: not pge_installed.stat.exists

- name: "复制二进制到 /opt/monitoring"
  copy:
    src: "/tmp/postgres_exporter-0.15.0.linux-amd64/postgres_exporter"
    dest: /opt/monitoring/postgres_exporter
    mode: "0755"
    remote_src: yes
  when: not pge_installed.stat.exists

- name: "清理临时文件"
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/pg_exporter.tar.gz
    - /tmp/postgres_exporter-0.15.0.linux-amd64
  when: not pge_installed.stat.exists

- name: "确保 monitor 用户存在"
  user:
    name: monitor
    system: yes
    shell: /bin/false
    create_home: no

- name: "创建 PG Exporter 环境变量文件"
  copy:
    dest: /opt/monitoring/postgres_exporter.env
    content: |
      DATA_SOURCE_NAME=postgresql://monitor:{{ monitor_password }}@127.0.0.1:5432/postgres?sslmode=disable
      PG_EXPORTER_AUTO_DISCOVER_DATABASES=true
  notify: restart pg_exporter

- name: "创建 PG Exporter systemd 服务"
  copy:
    dest: /etc/systemd/system/postgres_exporter.service
    content: |
      [Unit]
      Description=PostgreSQL Exporter
      After=network.target postgresql.service

      [Service]
      User=monitor
      EnvironmentFile=/opt/monitoring/postgres_exporter.env
      ExecStart=/opt/monitoring/postgres_exporter --web.listen-address=:9187
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: "重新加载 systemd 并启动 PG Exporter"
  systemd:
    name: postgres_exporter
    state: restarted
    enabled: yes
    daemon_reload: yes

- name: "等待 PG Exporter 端口就绪"
  wait_for:
    port: 9187
    timeout: 15
